services:
  frontend:
    build: ./mern/frontend
    ports:
    - "5173:80"
    networks:
      - compose
  backend:
    build: ./mern/backend
    ports:
    - "5050:5050"
    networks:
      - compose
    depends_on:
      - mongodb
  mongodb:
    image: mongo:latest
    ports:
    - "27017:27017"
    networks:
      - compose 
    volumes:
      - mongo-data:/data/db

networks:
  compose:
    driver: bridge

volumes:  
  mongo-data:
    driver: local
